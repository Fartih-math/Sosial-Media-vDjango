{% extends "base.html" %}

{% block contents %}
<div class="card p-4 shadow-sm text-center mx-auto mt-5" style="max-width: 500px;">
    <h3>Hapus Akun</h3>
    <p class="text-muted">Apakah Anda yakin ingin menghapus akun pengguna <strong>{{ akun.username }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Ya, Hapus</button>
        <a href="{% url 'sosmed:sosmed_home' %}" class="btn btn-secondary px-4">Batal</a>
    </form>
</div>
{% endblock contents %}
