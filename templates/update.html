{% extends "base.html" %}

{% block contents %}
<div class="card p-4 shadow-sm mx-auto mt-5" style="max-width: 500px;">
    <h2>{{ page_title }}</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" value="{{ akun.first_name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" value="{{ akun.last_name }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
        <a href="{% url 'sosmed:sosmed_home' %}" class="btn btn-secondary">Batal</a>
    </form>
</div>
{% endblock contents %}
