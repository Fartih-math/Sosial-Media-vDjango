{% extends "base.html" %}

{% block title %}
    {{ page_title }}
{% endblock title %}

{% block contents %}
<div class="card p-4 shadow-sm max-width-form mx-auto mt-4">
    <h1 class="mb-4 text-center">{{ page_title }}</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            {{ akun_form.as_p }}
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Kirim Data</button>
            <a href="{% url 'sosmed:sosmed_home' %}" class="btn btn-secondary">Kembali</a>
        </div>
    </form>
</div>
{% endblock contents %}
