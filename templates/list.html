{% extends "base.html" %}

{% block title %}
    {{page_title}}
{% endblock title %}

{% block contents %}
    <h1>{{page_title}}</h1>
<table class="table">
    <thead>
    <tr>
        <th scope="col">#</th>
        <th scope="col">First</th>
        <th scope="col">Last</th>
        <th scope="col">Hapus</th>
        <th scope="col">Ubah</th>
    </tr>
    </thead>
    <tbody>
      {% for akun in semua_akun %}
        <tr>
            <th scope="row">{{forloop.counter}}</th>
            <td>{{akun.first_name}}</td>
            <td>{{akun.last_name}}</td>
            <td>
                <a class="btn btn-danger btn-sm" href="{% url 'sosmed:delete' akun.id %}">Delete</a>
            </td>
            <td>
                <a class="btn btn-warning btn-sm" href="{% url 'sosmed:update' akun.id %}">Update</a>
            </td>
        </tr>
     {% endfor %}
    </tbody>
</table>
<a class="btn btn-primary" href="{% url 'sosmed:create' %}">Tambah</a>
{% endblock contents %}
